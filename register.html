<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <main class="auth-card">
        <a class="brand auth-brand" href="index.html" aria-label="Study Planner">
            <span class="brand-mark">SP</span>
            <span>
                <strong>Study Planner</strong>
                <small>AI PDF workspace</small>
            </span>
        </a>

        <div class="auth-heading">
            <span class="eyebrow">Start strong</span>
            <h1>Create your study workspace.</h1>
        </div>

        <form class="auth-form" action="register.php" method="POST">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" autocomplete="email" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" autocomplete="new-password" minlength="6" required>

            <button type="submit">Create Account</button>
        </form>

        <p class="switch-link">Already registered? <a href="login.html">Sign in</a></p>
        <p class="switch-link subtle-link"><a href="index.html">Back to home</a></p>
    </main>
</body>
</html>
